<div class="min-h-dvh bg-app-bg text-text">
  @if (isLoading()) {
    <div class="grid min-h-dvh place-items-center px-4">
      <p class="text-sm text-text-muted">Loading rdma26...</p>
    </div>
  } @else if (session()?.authEnabled && !session()?.authenticated) {
    <div class="grid min-h-dvh place-items-center px-4">
      <form
        class="w-full max-w-sm border border-border bg-surface p-5 shadow-sm"
        (submit)="$event.preventDefault(); login()"
      >
        <h1 class="text-lg font-semibold">rdma26</h1>
        <p class="mt-1 text-sm text-text-muted">Sign in to continue.</p>

        @if (loginError(); as currentLoginError) {
          <p class="mt-4 border border-danger-border bg-danger-soft px-3 py-2 text-sm text-danger">
            {{ currentLoginError }}
          </p>
        }

        <label class="mt-5 block text-sm font-medium text-text-muted" for="username"
          >Username</label
        >
        <input
          id="username"
          class="mt-1 h-10 w-full border border-border px-3 focus:outline-none focus-visible:shadow-[var(--focus-shadow)]"
          autocomplete="username"
          [ngModel]="username()"
          name="username"
          (ngModelChange)="updateUsername($event)"
        />

        <label class="mt-4 block text-sm font-medium text-text-muted" for="password"
          >Password</label
        >
        <input
          id="password"
          type="password"
          class="mt-1 h-10 w-full border border-border px-3 focus:outline-none focus-visible:shadow-[var(--focus-shadow)]"
          autocomplete="current-password"
          [ngModel]="password()"
          name="password"
          (ngModelChange)="updatePassword($event)"
        />

        <button
          type="submit"
          class="mt-5 h-10 w-full bg-accent px-4 text-sm font-semibold text-white hover:bg-accent-hover focus:outline-none focus-visible:shadow-[var(--focus-shadow)]"
        >
          Sign in
        </button>
      </form>
    </div>
  } @else {
    <div class="flex h-dvh overflow-hidden">
      <app-chat-sidebar
        [isCollapsed]="isSidebarCollapsed()"
        [isSettingsMenuOpen]="isSettingsMenuOpen()"
        [session]="session()"
        [agentOptions]="agentOptions()"
        [selectedAgentId]="selectedAgentId()"
        [threads]="threads()"
        [activeThreadId]="activeThread()?.id ?? null"
        [isRunning]="isRunning()"
        [theme]="theme()"
        (sidebarToggled)="toggleSidebar()"
        (threadCreated)="createThread()"
        (threadSelected)="selectThread($event)"
        (threadDeleted)="deleteThread($event)"
        (agentChanged)="updateAgent($event)"
        (settingsMenuToggled)="toggleSettingsMenu()"
        (settingsMenuClosed)="closeSettingsMenu()"
        (themeChanged)="updateTheme($event)"
        (signedOut)="logout()"
      />

      <main
        class="grid h-dvh min-h-0 min-w-0 flex-1 grid-rows-[minmax(0,1fr)_auto] overflow-hidden pl-16 lg:pl-0"
      >
        <app-chat-message-list
          [messages]="renderedMessages()"
          [isRunning]="isRunning()"
          [runActivity]="runActivity()"
          [messageResearchSources]="messageResearchSources()"
        />

        <app-chat-composer
          [draft]="draft()"
          [error]="error()"
          [summaryMessage]="summaryMessage()"
          [latestRunId]="latestRunId()"
          [canConsolidateSummary]="canConsolidateSummary()"
          [canSend]="canSend()"
          [modelOptions]="modelOptions()"
          [selectedModel]="selectedModel()"
          (draftChanged)="updateDraft($event)"
          (modelChanged)="updateModel($event)"
          (sent)="send()"
          (summaryConsolidated)="consolidateActiveThreadSummary()"
        />
      </main>
    </div>
  }
</div>
