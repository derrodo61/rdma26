<div class="min-h-dvh bg-app-bg text-text">
  @if (isLoading()) {
    <div class="grid min-h-dvh place-items-center px-4">
      <p class="text-sm text-text-muted">Loading rdma26...</p>
    </div>
  } @else if (session()?.authEnabled && !session()?.authenticated) {
    <app-chat-login
      [username]="username()"
      [password]="password()"
      [loginError]="loginError()"
      (usernameChanged)="updateUsername($event)"
      (passwordChanged)="updatePassword($event)"
      (submitted)="login()"
    />
  } @else {
    <div class="flex h-dvh overflow-hidden">
      <app-chat-sidebar
        [isCollapsed]="isSidebarCollapsed()"
        [isSettingsMenuOpen]="isSettingsMenuOpen()"
        [session]="session()"
        [agentOptions]="agentOptions()"
        [selectedAgentId]="selectedAgentId()"
        [threads]="threads()"
        [activeThreadId]="activeThread()?.id ?? null"
        [isRunning]="isRunning()"
        [theme]="theme()"
        (sidebarToggled)="toggleSidebar()"
        (threadCreated)="createThread()"
        (threadSelected)="selectThread($event)"
        (threadDeleted)="deleteThread($event)"
        (agentChanged)="updateAgent($event)"
        (settingsMenuToggled)="toggleSettingsMenu()"
        (settingsMenuClosed)="closeSettingsMenu()"
        (themeChanged)="updateTheme($event)"
        (signedOut)="logout()"
      />

      <main
        class="grid h-dvh min-h-0 min-w-0 flex-1 grid-rows-[minmax(0,1fr)_auto] overflow-hidden pl-16 lg:pl-0"
      >
        <app-chat-message-list
          [messages]="renderedMessages()"
          [isRunning]="isRunning()"
          [runActivity]="runActivity()"
          [messageResearchSources]="messageResearchSources()"
          [messageRunCosts]="messageRunCosts()"
        />

        <app-chat-composer
          [draft]="draft()"
          [error]="error()"
          [latestRunId]="latestRunId()"
          [canSend]="canSend()"
          [modelOptions]="modelOptions()"
          [selectedModel]="selectedModel()"
          (draftChanged)="updateDraft($event)"
          (modelChanged)="updateModel($event)"
          (sent)="send()"
        />
      </main>
    </div>
  }
</div>
