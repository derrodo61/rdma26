<div class="min-h-dvh bg-app-bg text-text">
  <header class="border-b border-border bg-surface">
    <div class="flex min-h-16 flex-wrap items-center justify-between gap-4 px-4 py-3 sm:px-6">
      <div class="min-w-0">
        <h1 class="truncate text-lg font-semibold">Agent Settings</h1>
      </div>
      <a
        routerLink="/"
        class="flex h-10 items-center border border-border bg-surface px-3 text-sm font-medium text-text-muted hover:bg-surface-muted focus:outline-none focus-visible:shadow-[var(--focus-shadow)]"
      >
        Back to chat
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-6 sm:px-6">
    @if (error(); as currentError) {
      <p class="mb-4 border border-danger-border bg-danger-soft px-3 py-2 text-sm text-danger">
        {{ currentError }}
      </p>
    }

    <section class="border-b border-border pb-6">
      <h2 class="text-sm font-semibold text-text-muted">New agent</h2>
      <form
        class="mt-3 grid gap-3 sm:grid-cols-[1fr_1fr_auto]"
        (submit)="$event.preventDefault(); createAgent()"
      >
        <label class="block text-sm font-medium text-text-muted">
          <span>Name</span>
          <input
            class="mt-1 h-10 w-full border border-border bg-surface px-3 text-text focus:outline-none focus-visible:shadow-[var(--focus-shadow)]"
            [ngModel]="newAgentName()"
            name="newAgentName"
            (ngModelChange)="updateNewAgentName($event)"
          />
        </label>
        <label class="block text-sm font-medium text-text-muted">
          <span>ID</span>
          <input
            class="mt-1 h-10 w-full border border-border bg-surface px-3 text-text focus:outline-none focus-visible:shadow-[var(--focus-shadow)]"
            [ngModel]="newAgentId()"
            name="newAgentId"
            (ngModelChange)="updateNewAgentId($event)"
          />
        </label>
        <button
          type="submit"
          class="mt-6 h-10 bg-accent px-4 text-sm font-semibold text-white hover:bg-accent-hover focus:outline-none focus-visible:shadow-[var(--focus-shadow)] disabled:cursor-not-allowed disabled:bg-control-disabled"
          [disabled]="!canCreate()"
        >
          Create
        </button>
      </form>
    </section>

    <section class="pt-6">
      <h2 class="text-sm font-semibold text-text-muted">Agents</h2>

      @if (isLoading()) {
        <p class="mt-4 text-sm text-text-muted">Loading agents...</p>
      } @else {
        <div class="mt-3 divide-y divide-border border border-border bg-surface">
          @for (agent of agents(); track agent.id) {
            <article class="grid gap-3 p-4 sm:grid-cols-[1fr_auto_auto] sm:items-center">
              <div class="min-w-0">
                <p class="truncate text-sm font-semibold text-text">{{ agent.name }}</p>
                <p class="mt-1 text-xs text-text-muted">
                  {{ agent.id }}
                  @if (isDefaultAgent(agent)) {
                    <span> · Default agent</span>
                  }
                </p>
              </div>

              <a
                [routerLink]="['/settings/agents', agent.id]"
                class="flex h-10 items-center border border-border bg-surface px-3 text-sm font-medium text-text-muted hover:bg-surface-muted focus:outline-none focus-visible:shadow-[var(--focus-shadow)]"
              >
                Edit
              </a>

              <button
                type="button"
                class="h-10 border border-danger-border bg-surface px-3 text-sm font-medium text-danger hover:bg-danger-soft focus:outline-none focus-visible:shadow-[var(--focus-shadow)] disabled:cursor-not-allowed disabled:border-border disabled:text-control-disabled"
                [disabled]="isDefaultAgent(agent) || isSaving()"
                (click)="deleteAgent(agent)"
              >
                Delete
              </button>
            </article>
          }
        </div>
      }
    </section>
  </main>
</div>
