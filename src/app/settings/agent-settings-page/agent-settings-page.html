<div class="min-h-dvh bg-stone-50 text-zinc-950">
  <header class="border-b border-zinc-200 bg-white">
    <div class="flex min-h-16 flex-wrap items-center justify-between gap-4 px-4 py-3 sm:px-6">
      <div class="min-w-0">
        <h1 class="truncate text-lg font-semibold">Agent Settings</h1>
      </div>
      <a
        routerLink="/"
        class="flex h-10 items-center border border-zinc-300 bg-white px-3 text-sm font-medium text-zinc-700 hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-teal-500"
      >
        Back to chat
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-6 sm:px-6">
    @if (error(); as currentError) {
      <p class="mb-4 border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">
        {{ currentError }}
      </p>
    }

    <section class="border-b border-zinc-200 pb-6">
      <h2 class="text-sm font-semibold text-zinc-700">New agent</h2>
      <form
        class="mt-3 grid gap-3 sm:grid-cols-[1fr_1fr_auto]"
        (submit)="$event.preventDefault(); createAgent()"
      >
        <label class="block text-sm font-medium text-zinc-700">
          <span>Name</span>
          <input
            class="mt-1 h-10 w-full border border-zinc-300 bg-white px-3 text-zinc-950 focus:outline-none focus:ring-2 focus:ring-teal-500"
            [ngModel]="newAgentName()"
            name="newAgentName"
            (ngModelChange)="updateNewAgentName($event)"
          />
        </label>
        <label class="block text-sm font-medium text-zinc-700">
          <span>ID</span>
          <input
            class="mt-1 h-10 w-full border border-zinc-300 bg-white px-3 text-zinc-950 focus:outline-none focus:ring-2 focus:ring-teal-500"
            [ngModel]="newAgentId()"
            name="newAgentId"
            (ngModelChange)="updateNewAgentId($event)"
          />
        </label>
        <button
          type="submit"
          class="mt-6 h-10 bg-teal-700 px-4 text-sm font-semibold text-white hover:bg-teal-800 focus:outline-none focus:ring-2 focus:ring-teal-500 disabled:cursor-not-allowed disabled:bg-zinc-300"
          [disabled]="!canCreate()"
        >
          Create
        </button>
      </form>
    </section>

    <section class="pt-6">
      <h2 class="text-sm font-semibold text-zinc-700">Agents</h2>

      @if (isLoading()) {
        <p class="mt-4 text-sm text-zinc-600">Loading agents...</p>
      } @else {
        <div class="mt-3 divide-y divide-zinc-200 border border-zinc-200 bg-white">
          @for (agent of agents(); track agent.id) {
            <article class="grid gap-3 p-4 lg:grid-cols-[12rem_1fr_auto_auto] lg:items-end">
              <div class="min-w-0">
                <p class="truncate text-sm font-semibold text-zinc-950">{{ agent.id }}</p>
                <p class="mt-1 text-xs text-zinc-500">
                  @if (isDefaultAgent(agent)) {
                    Default agent
                  } @else {
                    Agent
                  }
                </p>
              </div>

              <label class="block text-sm font-medium text-zinc-700">
                <span>Display name</span>
                <input
                  class="mt-1 h-10 w-full border border-zinc-300 bg-white px-3 text-zinc-950 focus:outline-none focus:ring-2 focus:ring-teal-500"
                  [ngModel]="draftName(agent.id)"
                  [name]="'agentName-' + agent.id"
                  (ngModelChange)="updateDraftName(agent.id, $event)"
                />
              </label>

              <button
                type="button"
                class="h-10 border border-zinc-300 bg-white px-3 text-sm font-medium text-zinc-700 hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-teal-500 disabled:cursor-not-allowed disabled:text-zinc-300"
                [disabled]="!hasNameChanges(agent) || isSaving()"
                (click)="saveAgent(agent)"
              >
                Save
              </button>

              <button
                type="button"
                class="h-10 border border-red-200 bg-white px-3 text-sm font-medium text-red-700 hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-red-400 disabled:cursor-not-allowed disabled:border-zinc-200 disabled:text-zinc-300"
                [disabled]="isDefaultAgent(agent) || isSaving()"
                (click)="deleteAgent(agent)"
              >
                Delete
              </button>
            </article>
          }
        </div>
      }
    </section>
  </main>
</div>
